<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BinaryBoost — Banner 728x90</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:728px;height:90px;overflow:hidden;font-family:'Inter',sans-serif;background:#050508;color:#fff;position:relative;display:flex;align-items:center;padding:0 24px}
canvas{position:absolute;inset:0;width:100%;height:100%;opacity:.25;pointer-events:none}
.content{display:flex;align-items:center;justify-content:space-between;width:100%;z-index:1;gap:12px}
.logo{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;white-space:nowrap}
.logo span{background:linear-gradient(135deg,#00ffff,#bf00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.text{font-size:13px;color:#8888aa;white-space:nowrap}
.text strong{color:#fff}
.btn{flex-shrink:0;padding:8px 18px;border-radius:4px;background:linear-gradient(135deg,#00ffff,#bf00ff);color:#000;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;text-decoration:none;white-space:nowrap}
</style>
</head>
<body>
<canvas id="net"></canvas>
<div class="content">
<div class="logo"><span>Binary</span>Boost</div>
<div class="text">Empezá en <strong>opciones binarias</strong> desde cero &nbsp;·&nbsp; Cuenta demo <strong>$10,000</strong> gratis</div>
<div class="btn">Crear cuenta</div>
</div>
<script>
const c=document.getElementById('net'),ctx=c.getContext('2d');
c.width=728;c.height=90;
class P{constructor(){this.x=Math.random()*728;this.y=Math.random()*90;this.vx=(Math.random()-.5)*.6;this.vy=(Math.random()-.5)*.6;this.r=1}
u(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>728)this.vx*=-1;if(this.y<0||this.y>90)this.vy*=-1}
d(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle='rgba(0,255,255,.4)';ctx.fill()}}
let pts=[...Array(30)].map(()=>new P);
function a(){ctx.clearRect(0,0,728,90);pts.forEach(p=>{p.u();p.d()});for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){let dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<80){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(0,255,255,${.1*(1-d/80)})`;ctx.stroke()}}}requestAnimationFrame(a)}
a();
</script>
</body>
</html>
