<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gracias por tu compra — BinaryBoost</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050508;--card:#0d0d1a;--text:#f0f0f5;--text2:#8888aa;--green:#39ff14;--blue:#00ffff;--border:rgba(255,255,255,.06);--g1:linear-gradient(135deg,#00ffff,#bf00ff);--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
::selection{background:#bf00ff;color:#fff}
.card{max-width:500px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:48px 36px;text-align:center;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:var(--g1)}
.icon{font-size:64px;display:block;margin-bottom:16px}
h1{font-size:28px;letter-spacing:-.03em;margin-bottom:8px}
h1 span{background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:var(--text2);font-size:14px;line-height:1.7;margin-bottom:20px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:6px;font-weight:700;font-size:13px;border:none;cursor:pointer;background:var(--g1);color:#000;text-decoration:none;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;transition:transform .2s}
.btn:hover{transform:translateY(-2px)}
.email-info{font-size:12px;color:var(--text2);margin-top:16px;font-family:var(--mono)}
</style>
</head>
<body>
<div class="card">
<span class="icon">✅</span>
<h1>¡Gracias por tu <span>compra</span>!</h1>
<p>Te enviamos la guía completa a tu email de PayPal. Revisá tu bandeja de entrada (y la carpeta de spam).</p>
<p style="font-size:13px;color:#8888aa">Si no recibís el email en 10 minutos, escribinos a:</p>
<p class="email-info">📧 latamdreamscape@gmail.com</p>
<br>
<a href="../index.html" class="btn">Volver a BinaryBoost</a>
</div>
</body>
</html>
