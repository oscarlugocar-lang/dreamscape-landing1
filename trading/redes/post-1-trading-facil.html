<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Post 1 — Trading Fácil</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:#050508;color:#fff;position:relative;display:flex;align-items:center;justify-content:center;text-align:center;padding:60px}canvas{position:absolute;inset:0;width:100%;height:100%;opacity:.25}.content{position:relative;z-index:1}.tag{font-family:'JetBrains Mono',monospace;font-size:12px;color:#00ffff;text-transform:uppercase;letter-spacing:2px;border:1px solid rgba(0,255,255,.15);padding:6px 14px;border-radius:4px;display:inline-block;margin-bottom:40px}h1{font-size:82px;font-weight:900;line-height:1.05;letter-spacing:-.04em;margin-bottom:20px}h1 .g{background:linear-gradient(135deg,#00ffff,#bf00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}p{font-size:24px;color:#8888aa;max-width:700px;margin:0 auto;line-height:1.5}.cta{margin-top:48px;font-family:'JetBrains Mono',monospace;font-size:16px;color:#555577;letter-spacing:2px}</style></head>
<body><canvas id="p"></canvas><div class="content"><div class="tag">📈 BinaryBoost</div><h1>El trading<br><span class="g">sí puede ser simple</span></h1><p>Sin jerga. Sin complicaciones. Solo lo que necesitás para arrancar.</p><div class="cta">⬇️ Link en bio</div></div>
<script>const c=document.getElementById('p'),ctx=c.getContext('2d');c.width=1080;c.height=1080;class P{constructor(){this.x=Math.random()*1080;this.y=Math.random()*1080;this.vx=(Math.random()-.5)*.6;this.vy=(Math.random()-.5)*.6;this.r=Math.random()*1.5+1}u(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>1080)this.vx*=-1;if(this.y<0||this.y>1080)this.vy*=-1}d(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle='rgba(0,255,255,.5)';ctx.fill()}}let pts=[...Array(50)].map(()=>new P);function a(){ctx.clearRect(0,0,1080,1080);pts.forEach(p=>{p.u();p.d()});for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){let dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<150){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(0,255,255,${.1*(1-d/150)})`;ctx.stroke()}}}requestAnimationFrame(a)}a()</script></body></html>
